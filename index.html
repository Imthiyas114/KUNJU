<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For PATHU — My Heart 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --rose: #e8536a;
      --gold: #f2c96e;
      --deep: #120810;
    }
    html { scroll-behavior: smooth; }
    body { font-family:'Lato',sans-serif; background:#120810; color:#fff; overflow-x:hidden; }

    /* ── STARFIELD ── */
    #stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .star {
      position:absolute; border-radius:50%; background:#fff;
      animation:twinkle linear infinite;
    }
    @keyframes twinkle {
      0%,100%{opacity:.1;transform:scale(1);}
      50%{opacity:.9;transform:scale(1.8);}
    }

    /* ── PETAL CANVAS ── */
    #petal-canvas { position:fixed; inset:0; pointer-events:none; z-index:1; }

    /* ══════════════════════════════
       SECTION 1 — FULL-SCREEN HERO
       Hero BG = pic1.jpg (the collage)
    ══════════════════════════════ */
    #hero {
      position:relative; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; text-align:center; overflow:hidden;
    }
    #hero-bg {
      position:absolute; inset:0; z-index:0;
      background:
        linear-gradient(160deg, rgba(18,8,16,0.30) 0%, rgba(18,8,16,0.60) 50%, rgba(18,8,16,0.90) 100%),
        url('pic1.jpg') center top / cover no-repeat;
      animation:slowZoom 22s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from{transform:scale(1);}to{transform:scale(1.07);}
    }

    .hero-content { position:relative; z-index:2; padding:2rem; }

    .hero-badge {
      display:inline-block; font-size:.72rem; letter-spacing:.5em;
      text-transform:uppercase; color:var(--gold);
      border:1px solid rgba(242,201,110,.35); padding:.3rem 1.2rem;
      border-radius:50px; margin-bottom:1.4rem;
      animation:fadeUp 1.2s .2s both;
    }
    .hero-name {
      font-family:'Great Vibes',cursive;
      font-size:clamp(5.5rem,20vw,11rem);
      background:linear-gradient(135deg,#fff 20%,var(--gold) 55%,var(--rose) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 45px rgba(232,83,106,.55));
      line-height:1; animation:fadeUp 1.4s .4s both;
    }
    .hero-sub {
      font-family:'Playfair Display',serif; font-style:italic;
      font-size:clamp(1rem,2.8vw,1.5rem); color:rgba(255,255,255,.82);
      margin-top:1rem; line-height:1.8;
      animation:fadeUp 1.4s .7s both;
    }
    .hero-cta {
      margin-top:2.5rem; display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;
      animation:fadeUp 1.4s 1s both;
    }
    .btn-primary {
      background:linear-gradient(135deg,var(--rose),#b5233b);
      border:none; color:#fff;
      font-family:'Playfair Display',serif; font-style:italic; font-size:1.05rem;
      padding:.85rem 2.4rem; border-radius:50px; cursor:pointer;
      box-shadow:0 8px 35px rgba(232,83,106,.5);
      transition:transform .3s,box-shadow .3s; text-decoration:none;
      display:inline-block;
    }
    .btn-primary:hover { transform:translateY(-4px) scale(1.04); box-shadow:0 16px 50px rgba(232,83,106,.65); }
    .btn-secondary {
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.25); color:#fff;
      font-family:'Playfair Display',serif; font-style:italic; font-size:1.05rem;
      padding:.85rem 2.4rem; border-radius:50px; cursor:pointer;
      transition:transform .3s,background .3s; text-decoration:none;
      display:inline-block; backdrop-filter:blur(8px);
    }
    .btn-secondary:hover { transform:translateY(-4px); background:rgba(255,255,255,.14); }

    @keyframes fadeUp {
      from{opacity:0;transform:translateY(55px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* floating hearts on hero */
    .fheart { position:absolute; pointer-events:none; opacity:0; animation:floatHeart linear infinite; }
    @keyframes floatHeart {
      0%{opacity:0;transform:translateY(0) scale(.5) rotate(-15deg);}
      10%{opacity:.7;}
      85%{opacity:.4;}
      100%{opacity:0;transform:translateY(-110vh) scale(1.3) rotate(25deg);}
    }

    /* ══════════════════════════════
       SECTION 2 — EYE / GAZE
       BG = pic2.jpg (close-up eye)
    ══════════════════════════════ */
    #gaze {
      position:relative; min-height:80vh;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; padding:5rem 2rem;
    }
    #gaze-bg {
      position:absolute; inset:0; z-index:0;
      background:
        radial-gradient(ellipse at center, rgba(18,8,16,0.15) 0%, rgba(18,8,16,0.75) 60%, rgba(18,8,16,.98) 100%),
        url('pic2.jpg') center center / cover no-repeat;
    }
    .gaze-content {
      position:relative; z-index:1; text-align:center; max-width:700px;
    }
    .gaze-quote {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.5rem,8vw,5rem);
      background:linear-gradient(135deg,#fff,var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 25px rgba(242,201,110,.4));
      line-height:1.3; margin-bottom:1.5rem;
    }
    .gaze-sub {
      font-family:'Playfair Display',serif; font-style:italic;
      font-size:clamp(.95rem,2.3vw,1.3rem); color:rgba(255,255,255,.8); line-height:1.9;
    }

    /* ══════════════════════════════
       SECTION 3 — PHOTO GALLERY
       Full bleed photos side by side
    ══════════════════════════════ */
    #gallery {
      position:relative; z-index:2; padding:5rem 2rem;
      background:linear-gradient(180deg,#120810 0%,#1e0619 50%,#120810 100%);
    }
    .gallery-label {
      text-align:center; margin-bottom:3rem;
    }
    .gallery-badge {
      display:inline-block; font-size:.72rem; letter-spacing:.4em;
      text-transform:uppercase; color:var(--gold);
      border:1px solid rgba(242,201,110,.3); padding:.3rem 1.2rem; border-radius:50px;
      margin-bottom:1rem;
    }
    .gallery-title {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.8rem,5vw,3rem);
      background:linear-gradient(135deg,var(--rose),var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:1.5rem; max-width:1000px; margin:0 auto;
    }
    .gallery-card {
      border-radius:22px; overflow:hidden;
      position:relative; aspect-ratio:3/4;
      box-shadow:0 10px 40px rgba(0,0,0,.5);
      transition:transform .4s,box-shadow .4s;
      cursor:default;
    }
    .gallery-card:hover {
      transform:scale(1.03) translateY(-6px);
      box-shadow:0 25px 65px rgba(232,83,106,.35);
    }
    .gallery-card-bg {
      position:absolute; inset:0; background-size:cover; background-position:center;
      transition:transform .5s;
    }
    .gallery-card:hover .gallery-card-bg { transform:scale(1.06); }
    .gallery-card-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top,rgba(18,8,16,.85) 0%,transparent 55%);
    }
    .gallery-card-text {
      position:absolute; bottom:1.5rem; left:1.5rem; right:1.5rem;
    }
    .gallery-card-text h3 {
      font-family:'Great Vibes',cursive; font-size:2rem;
      color:var(--gold); margin-bottom:.3rem;
    }
    .gallery-card-text p {
      font-family:'Playfair Display',serif; font-style:italic;
      font-size:.85rem; color:rgba(255,255,255,.75);
    }

    /* ══════════════════════════════
       SECTION 4 — ENTER THE SURPRISE
       Full-bleed pic1 with CTA
    ══════════════════════════════ */
    #enter {
      position:relative; min-height:70vh;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; text-align:center; overflow:hidden; padding:5rem 2rem;
    }
    #enter-bg {
      position:absolute; inset:0; z-index:0;
      background:
        linear-gradient(135deg,rgba(18,8,16,.55) 0%,rgba(50,10,30,.65) 100%),
        url('pic1.jpg') center bottom / cover no-repeat;
      filter:blur(2px) brightness(.85);
    }
    .enter-content { position:relative; z-index:1; max-width:680px; }
    .enter-title {
      font-family:'Great Vibes',cursive;
      font-size:clamp(3rem,10vw,6rem);
      background:linear-gradient(135deg,#fff,var(--rose));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 35px rgba(232,83,106,.6));
      margin-bottom:1.2rem;
    }
    .enter-msg {
      font-family:'Playfair Display',serif; font-style:italic;
      font-size:clamp(1rem,2.5vw,1.3rem); color:rgba(255,255,255,.85); line-height:1.9;
      margin-bottom:2.5rem;
    }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity:0; transform:translateY(40px); transition:opacity .8s,transform .8s; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* ── FOOTER ── */
    footer {
      position:relative; z-index:2; text-align:center; padding:2.5rem 1rem;
      background:#0d060e;
      font-family:'Playfair Display',serif; font-style:italic;
      color:rgba(255,255,255,.35); font-size:.85rem;
    }
    footer span { color:var(--rose); }
  </style>
</head>
<body>

<div id="stars"></div>
<canvas id="petal-canvas"></canvas>

<!-- ══ HERO ══ -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-hearts"></div>

  <div class="hero-content">
    <div class="hero-badge">✦ A Message From My Heart ✦</div>
    <h1 class="hero-name">PATHUSE</h1>
    <p class="hero-sub">
      Every time I look at you,<br/>
      I fall in love all over again. 🌹
    </p>
    <div class="hero-cta">
      <a href="surprise.html" class="btn-primary">Open Your Surprise 💌</a>
      <a href="#gaze" class="btn-secondary">Read More ✨</a>
    </div>
  </div>
</section>

<!-- ══ GAZE SECTION ══ -->
<section id="gaze">
  <div id="gaze-bg"></div>
  <div class="gaze-content reveal">
    <div class="gaze-quote">"Your eyes tell a thousand stories…"</div>
    <p class="gaze-sub">
      In those beautiful eyes of yours, I see the universe —<br/>
      warmth, depth, and a whole world I never want to stop exploring.<br/>
      You are breathtakingly, impossibly beautiful, Fathima.
    </p>
  </div>
</section>

<!-- ══ GALLERY ══ -->
<section id="gallery">
  <div class="gallery-label reveal">
    <div class="gallery-badge">✦ A Glimpse of You ✦</div>
    <h2 class="gallery-title">You Are My Favorite View</h2>
  </div>

  <div class="gallery-grid">
    <div class="gallery-card reveal">
      <div class="gallery-card-bg" style="background-image:url('pic1.jpg');"></div>
      <div class="gallery-card-overlay"></div>
      <div class="gallery-card-text">
        <h3>My Sunshine</h3>
        <p>The warmth in your smile brightens every single day</p>
      </div>
    </div>
    <div class="gallery-card reveal" style="transition-delay:.15s;">
      <div class="gallery-card-bg" style="background-image:url('pic2.jpg'); background-position:center center;"></div>
      <div class="gallery-card-overlay"></div>
      <div class="gallery-card-text">
        <h3>Those Eyes</h3>
        <p>Two windows to the most beautiful soul I have ever known</p>
      </div>
    </div>
    <div class="gallery-card reveal" style="transition-delay:.3s;">
      <div class="gallery-card-bg" style="background-image:url('pic3.jpg');"></div>
      <div class="gallery-card-overlay"></div>
      <div class="gallery-card-text">
        <h3>My World</h3>
        <p>You are everything I ever dreamed of and more</p>
      </div>
    </div>
  </div>
</section>

<!-- ══ ENTER SURPRISE ══ -->
<section id="enter">
  <div id="enter-bg"></div>
  <div class="enter-content reveal">
    <div class="enter-title">I Made This For You</div>
    <p class="enter-msg">
      Every pixel of this page was crafted with love, just for you.<br/>
      Step inside and let my heart speak — because you deserve every beautiful word.
    </p>
    <a href="surprise.html" class="btn-primary" style="font-size:1.2rem;padding:1rem 3rem;">
      Open Your Surprise 💌
    </a>
  </div>
</section>

<footer>
  Made with <span>❤️</span> by <span>Imthiyas</span>, for the love of his life <span>Fathima</span>
</footer>

<script>
/* ── STARFIELD ── */
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<130;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.2+.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*6}s;`;
    c.appendChild(s);
  }
})();

/* ── FLOATING HEARTS ON HERO ── */
(function(){
  const c=document.getElementById('hero-hearts');
  c.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:1;';
  const em=['❤️','💕','💖','🌹','✨','💗','🌸','💫'];
  for(let i=0;i<20;i++){
    const h=document.createElement('div'); h.className='fheart';
    h.textContent=em[Math.floor(Math.random()*em.length)];
    const sz=.7+Math.random()*1.1;
    h.style.cssText=`left:${Math.random()*100}%;bottom:${-Math.random()*5}%;font-size:${sz}rem;animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*12}s;`;
    c.appendChild(h);
  }
})();

/* ── FALLING PETALS ── */
(function(){
  const canvas=document.getElementById('petal-canvas');
  const ctx=canvas.getContext('2d');
  let W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});
  const colors=['#e8536a','#f06292','#f2c96e','#fde8ec','#ff80ab','#ffc1cc'];
  class Petal{
    constructor(){this.reset(true);}
    reset(init){
      this.x=Math.random()*W; this.y=init?Math.random()*-H:-15;
      this.r=3+Math.random()*8; this.color=colors[Math.floor(Math.random()*colors.length)];
      this.speed=.7+Math.random()*1.6; this.drift=(Math.random()-.5)*.9;
      this.spin=0; this.spinS=(Math.random()-.5)*.06; this.op=.4+Math.random()*.55;
    }
    update(){
      this.y+=this.speed; this.x+=this.drift+Math.sin(this.y*.025)*.6; this.spin+=this.spinS;
      if(this.y>H+20)this.reset(false);
    }
    draw(){
      ctx.save(); ctx.globalAlpha=this.op;
      ctx.translate(this.x,this.y); ctx.rotate(this.spin);
      ctx.beginPath(); ctx.ellipse(0,0,this.r,this.r*.5,0,0,Math.PI*2);
      ctx.fillStyle=this.color; ctx.fill(); ctx.restore();
    }
  }
  const petals=Array.from({length:65},()=>new Petal());
  function loop(){ctx.clearRect(0,0,W,H);petals.forEach(p=>{p.update();p.draw();});requestAnimationFrame(loop);}
  loop();
})();

/* ── SCROLL REVEAL ── */
(function(){
  const els=document.querySelectorAll('.reveal');
  const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');io.unobserve(x.target);}}),{threshold:.1});
  els.forEach(el=>io.observe(el));
})();
</script>
</body>
</html>
